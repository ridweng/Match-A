services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matcha
      POSTGRES_USER: matcha
      POSTGRES_PASSWORD: matcha
      PGDATA: /var/lib/postgresql/data/db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    depends_on:
      - postgres
      - mailpit
    ports:
      - "8082:8082"
    volumes:
      - ./data/media:/app/artifacts/api-server/storage/media
    environment:
      APP_NAME: Matcha
      APP_ENV: development
      APP_PORT: 8082
      API_BASE_URL: http://localhost:8082
      FRONTEND_BASE_URL: http://localhost:8080
      AUTH_FRONTEND_REDIRECT_URI: matcha:///auth-callback
      AUTH_SESSION_SECRET: change-me
      AUTH_ACCESS_TTL_MINUTES: 15
      AUTH_REFRESH_TTL_DAYS: 30
      AUTH_PASSWORD_RESET_TTL_MINUTES: 60
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: 1440
      AUTH_PASSWORD_RESET_URL_BASE: http://localhost:8080/reset-password
      DATABASE_URL: postgresql://matcha:matcha@postgres:5432/matcha
      SMTP_ENABLED: "true"
      EMAIL_LOG_ONLY: "false"
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM_EMAIL: no-reply@matcha.local
      SMTP_FROM_NAME: Matcha
      SMTP_CONNECTION_TIMEOUT_MS: 10000
      SMTP_SOCKET_TIMEOUT_MS: 20000
      SMTP_VERIFY_ON_STARTUP: "false"
    command: >
      sh -lc "pnpm db:migrate &&
      pnpm db:seed &&
      node artifacts/api-server/dist/index.cjs"
