kind = "mobile"
previewPath = "/"
title = "MatchA"
version = "1.0.0"
id = "artifacts/matcha-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 22776
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/matcha-app run dev"

[services.env]
PORT = "22776"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/matcha-app", "run", "build"]
run = ["pnpm", "--filter", "@workspace/matcha-app", "run", "serve"]
