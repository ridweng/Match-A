services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/db
    expose:
      - "5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    ports:
      - "8025:8025"
    expose:
      - "1025"
      - "8025"

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    depends_on:
      - postgres
      - mailpit
    ports:
      - "8082:8082"
    volumes:
      - ./data/media:/app/artifacts/api-server/storage/media
    restart: unless-stopped
    environment:
      APP_NAME: Matcha
      APP_ENV: production
      NODE_ENV: production
      APP_PORT: 8082
      API_BASE_URL: ${API_BASE_URL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      AUTH_FRONTEND_REDIRECT_URI: ${AUTH_FRONTEND_REDIRECT_URI}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      AUTH_ACCESS_TTL_MINUTES: 15
      AUTH_REFRESH_TTL_DAYS: 30
      AUTH_PASSWORD_RESET_TTL_MINUTES: 60
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: 1440
      AUTH_PASSWORD_RESET_URL_BASE: ${AUTH_PASSWORD_RESET_URL_BASE}
      DATABASE_URL: ${DATABASE_URL}
      SMTP_ENABLED: "true"
      EMAIL_LOG_ONLY: "false"
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM_EMAIL: no-reply@matcha.local
      SMTP_FROM_NAME: Matcha
      SMTP_CONNECTION_TIMEOUT_MS: 10000
      SMTP_SOCKET_TIMEOUT_MS: 20000
      SMTP_VERIFY_ON_STARTUP: "false"
      ADMIN_DASHBOARD_ENABLED: "true"
      ADMIN_BASIC_AUTH_USERNAME: ${ADMIN_BASIC_AUTH_USERNAME}
      ADMIN_BASIC_AUTH_PASSWORD: ${ADMIN_BASIC_AUTH_PASSWORD}
    command: >
      sh -lc "pnpm db:migrate &&
      pnpm db:seed &&
      node artifacts/api-server/dist/index.cjs"
