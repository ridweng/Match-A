services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/db
    expose:
      - "5432"
    volumes:
      - /srv/matcha/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - matcha_backend

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - matcha_backend

  api-migrate:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment:
      APP_NAME: Matcha
      APP_ENV: production
      NODE_ENV: production
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-warn}
      APP_SERVICE_MODE: all
      APP_PORT: 8082
      API_BASE_URL: https://${API_HOSTNAME}
      ADMIN_BASE_URL: https://${ADMIN_HOSTNAME}
      FRONTEND_BASE_URL: https://${LANDING_HOSTNAME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      ADMIN_CORS_ALLOWED_ORIGINS: ${ADMIN_CORS_ALLOWED_ORIGINS:-}
      AUTH_FRONTEND_REDIRECT_URI: ${AUTH_FRONTEND_REDIRECT_URI}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      AUTH_ACCESS_TTL_MINUTES: 60
      AUTH_REFRESH_TTL_DAYS: 30
      AUTH_PASSWORD_RESET_TTL_MINUTES: 60
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: 1440
      AUTH_PASSWORD_RESET_URL_BASE: https://${LANDING_HOSTNAME}/reset-password
      DATABASE_URL: ${DATABASE_URL}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      EMAIL_LOG_ONLY: ${EMAIL_LOG_ONLY:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@matcha.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Matcha}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-10000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      SMTP_VERIFY_ON_STARTUP: ${SMTP_VERIFY_ON_STARTUP:-false}
      ADMIN_DASHBOARD_ENABLED: "true"
      ADMIN_BASIC_AUTH_USERNAME: ${ADMIN_BASIC_AUTH_USERNAME}
      ADMIN_BASIC_AUTH_PASSWORD: ${ADMIN_BASIC_AUTH_PASSWORD}
      ADMIN_ALLOWED_CIDRS: ${ADMIN_ALLOWED_CIDRS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      APPLE_SERVICE_ID: ${APPLE_SERVICE_ID:-}
    command: >
      sh -lc "pnpm --dir lib/db migrate"
    networks:
      - matcha_backend

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api-migrate:
        condition: service_completed_successfully
    expose:
      - "8082"
    volumes:
      - /srv/matcha/media:/app/artifacts/api-server/storage/media
    restart: unless-stopped
    environment:
      APP_NAME: Matcha
      APP_ENV: production
      NODE_ENV: production
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-warn}
      APP_SERVICE_MODE: public
      APP_PORT: 8082
      API_BASE_URL: https://${API_HOSTNAME}
      ADMIN_BASE_URL: https://${ADMIN_HOSTNAME}
      FRONTEND_BASE_URL: https://${LANDING_HOSTNAME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      ADMIN_CORS_ALLOWED_ORIGINS: ${ADMIN_CORS_ALLOWED_ORIGINS:-}
      AUTH_FRONTEND_REDIRECT_URI: ${AUTH_FRONTEND_REDIRECT_URI}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      AUTH_ACCESS_TTL_MINUTES: 60
      AUTH_REFRESH_TTL_DAYS: 30
      AUTH_PASSWORD_RESET_TTL_MINUTES: 60
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: 1440
      AUTH_PASSWORD_RESET_URL_BASE: https://${LANDING_HOSTNAME}/reset-password
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RATE_LIMIT_REDIS_ENABLED: ${RATE_LIMIT_REDIS_ENABLED:-true}
      RATE_LIMIT_GENERAL_MAX: ${RATE_LIMIT_PUBLIC_GENERAL_MAX:-300}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_DEFAULT_TTL_SECONDS: ${CACHE_DEFAULT_TTL_SECONDS:-60}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      EMAIL_LOG_ONLY: ${EMAIL_LOG_ONLY:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@matcha.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Matcha}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-10000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      SMTP_VERIFY_ON_STARTUP: ${SMTP_VERIFY_ON_STARTUP:-false}
      ADMIN_DASHBOARD_ENABLED: "false"
      ADMIN_BASIC_AUTH_USERNAME: ${ADMIN_BASIC_AUTH_USERNAME}
      ADMIN_BASIC_AUTH_PASSWORD: ${ADMIN_BASIC_AUTH_PASSWORD}
      ADMIN_ALLOWED_CIDRS: ${ADMIN_ALLOWED_CIDRS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      APPLE_SERVICE_ID: ${APPLE_SERVICE_ID:-}
    networks:
      - matcha_backend
      - matcha_public

  admin-api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api-migrate:
        condition: service_completed_successfully
    expose:
      - "8083"
    volumes:
      - /srv/matcha/media:/app/artifacts/api-server/storage/media
    restart: unless-stopped
    environment:
      APP_NAME: Matcha
      APP_ENV: production
      NODE_ENV: production
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-warn}
      APP_SERVICE_MODE: admin
      APP_PORT: 8083
      API_BASE_URL: https://${API_HOSTNAME}
      ADMIN_BASE_URL: https://${ADMIN_HOSTNAME}
      FRONTEND_BASE_URL: https://${LANDING_HOSTNAME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      ADMIN_CORS_ALLOWED_ORIGINS: ${ADMIN_CORS_ALLOWED_ORIGINS:-}
      AUTH_FRONTEND_REDIRECT_URI: ${AUTH_FRONTEND_REDIRECT_URI}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      AUTH_ACCESS_TTL_MINUTES: 60
      AUTH_REFRESH_TTL_DAYS: 30
      AUTH_PASSWORD_RESET_TTL_MINUTES: 60
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: 1440
      AUTH_PASSWORD_RESET_URL_BASE: https://${LANDING_HOSTNAME}/reset-password
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RATE_LIMIT_REDIS_ENABLED: ${RATE_LIMIT_REDIS_ENABLED:-true}
      RATE_LIMIT_ADMIN_MAX: ${RATE_LIMIT_ADMIN_MAX:-1200}
      RATE_LIMIT_ADMIN_WINDOW_MS: ${RATE_LIMIT_ADMIN_WINDOW_MS:-300000}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_DEFAULT_TTL_SECONDS: ${CACHE_DEFAULT_TTL_SECONDS:-60}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      EMAIL_LOG_ONLY: ${EMAIL_LOG_ONLY:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@matcha.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Matcha}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-10000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      SMTP_VERIFY_ON_STARTUP: ${SMTP_VERIFY_ON_STARTUP:-false}
      ADMIN_DASHBOARD_ENABLED: "true"
      ADMIN_BASIC_AUTH_USERNAME: ${ADMIN_BASIC_AUTH_USERNAME}
      ADMIN_BASIC_AUTH_PASSWORD: ${ADMIN_BASIC_AUTH_PASSWORD}
      ADMIN_ALLOWED_CIDRS: ${ADMIN_ALLOWED_CIDRS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      APPLE_SERVICE_ID: ${APPLE_SERVICE_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/api/healthz/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - matcha_backend
      - matcha_public

  web:
    build:
      context: .
      dockerfile: artifacts/matcha-app/Dockerfile.web
      args:
        EXPO_PUBLIC_AUTH_API_URL: https://${API_HOSTNAME}
        EXPO_PUBLIC_ADMIN_DASHBOARD_POLL_MS: ${ADMIN_DASHBOARD_POLL_MS:-30000}
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - matcha_backend

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      api:
        condition: service_started
      admin-api:
        condition: service_started
      web:
        condition: service_started
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      LANDING_HOSTNAME: ${LANDING_HOSTNAME}
      API_HOSTNAME: ${API_HOSTNAME}
      ADMIN_HOSTNAME: ${ADMIN_HOSTNAME}
    volumes:
      - ./Caddyfile.aws:/etc/caddy/Caddyfile:ro
      - ./ops/landing:/srv/landing:ro
      - ./artifacts/matcha-app/assets/images:/srv/app-assets:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - matcha_public
      - matcha_backend

volumes:
  caddy_data:
  caddy_config:

networks:
  matcha_backend:
    internal: true
  matcha_public:
